name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional app version override, for example 1.0.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Check backend build fingerprint
        id: backend
        shell: pwsh
        run: |
          . ./scripts/backend-state.ps1
          $status = Get-BackendBuildStatus -RepoRoot (Get-Location).Path -Configuration Release
          $current = if ($status.IsCurrent) { "true" } else { "false" }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "current=$current"
          Write-Host "Backend current: $current ($($status.Reason))"

      - name: Setup Vulkan SDK
        if: steps.backend.outputs.current != 'true'
        shell: pwsh
        run: ./scripts/setup-vulkan-sdk.ps1

      - name: Build all outputs
        shell: pwsh
        env:
          APP_VERSION: ${{ github.event.inputs.version }}
        run: ./scripts/build-all.ps1 -Clean -Version "$env:APP_VERSION"

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path dist\* -DestinationPath artifacts\Real-ESRGAN-GUI-win-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Real-ESRGAN-GUI-win-x64
          path: artifacts/Real-ESRGAN-GUI-win-x64.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "artifacts\Real-ESRGAN-GUI-win-x64.zip"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --verify-tag --generate-notes
          }
