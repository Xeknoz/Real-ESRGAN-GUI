name: Build Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional app version override, for example 1.0.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  build:
    runs-on: windows-2022
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH.REVISION. Got: $tag"
          }

      - name: Check repository set
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git config --file .gitmodules --get-regexp "^submodule\..*\.(path|url)$"
          $submodules = @(git submodule status --recursive)
          if ($LASTEXITCODE -ne 0) {
            throw "git submodule status --recursive failed."
          }

          foreach ($line in $submodules) {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $prefix = $line.Substring(0, 1)
            if ($prefix -ne " ") {
              throw "Submodule is not release-ready: $line"
            }
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Install Enigma Virtual Box
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Join-Path $env:RUNNER_TEMP "enigmavb.exe"
          Invoke-WebRequest -Uri "https://enigmaprotector.com/assets/files/enigmavb.exe" -OutFile $installer

          $process = Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Enigma Virtual Box installer failed with exit code $($process.ExitCode)."
          }

          $candidates = @(
            (Join-Path ${env:ProgramFiles(x86)} "Enigma Virtual Box\enigmavbconsole.exe"),
            (Join-Path $env:ProgramFiles "Enigma Virtual Box\enigmavbconsole.exe")
          )
          $console = $candidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1
          if (-not $console) {
            throw "enigmavbconsole.exe was not found after installing Enigma Virtual Box."
          }

          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ENIGMA_CONSOLE=$console"
          Add-Content -LiteralPath $env:GITHUB_PATH -Value (Split-Path -Parent $console)
          Write-Host "Using Enigma Virtual Box console: $console"

      - name: Check backend build fingerprint
        id: backend
        shell: pwsh
        run: |
          . ./scripts/backend-state.ps1
          $status = Get-BackendBuildStatus -RepoRoot (Get-Location).Path -Configuration Release
          $current = if ($status.IsCurrent) { "true" } else { "false" }
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value "current=$current"
          Write-Host "Backend current: $current ($($status.Reason))"

      - name: Setup Vulkan SDK
        if: steps.backend.outputs.current != 'true'
        shell: pwsh
        run: ./scripts/setup-vulkan-sdk.ps1 -RequireLib32

      - name: Build release outputs
        shell: pwsh
        env:
          APP_VERSION: ${{ github.event.inputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseArgs = @{
            BuildEnigma = $true
            EnigmaConsolePath = $env:ENIGMA_CONSOLE
            PortableRoot = "artifacts\intermediate\portable"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:APP_VERSION)) {
            $releaseArgs.Version = $env:APP_VERSION
          }

          ./scripts/build-release.ps1 @releaseArgs

      - name: Resolve release assets
        shell: pwsh
        run: ./scripts/resolve-release-assets.ps1 -Clean -RequireInstallers -RequireEnigma

      - name: Write release evidence
        id: release_evidence
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          ./scripts/write-release-evidence.ps1 -Tag $tag -OutputDir artifacts\release-evidence -RequireInstallers -RequireEnigma
          "sha256_path=artifacts\release-evidence\SHA256SUMS.txt" >> $env:GITHUB_OUTPUT
          "manifest_path=artifacts\release-evidence\release-manifest.json" >> $env:GITHUB_OUTPUT

      - name: Generate release asset attestations
        if: ${{ !github.event.repository.private }}
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/installers/Real-ESRGAN-GUI-Setup-x64.exe
            artifacts/installers/Real-ESRGAN-GUI-Setup-x86.exe
            artifacts/portable-enigma/Real-ESRGAN-GUI-Portable-x64.exe
            artifacts/portable-enigma/Real-ESRGAN-GUI-Portable-x86.exe

      - name: Generate release evidence attestations
        if: ${{ !github.event.repository.private }}
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/release-evidence/SHA256SUMS.txt
            artifacts/release-evidence/release-manifest.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Real-ESRGAN-GUI-release-assets
          path: |
            artifacts/installers/Real-ESRGAN-GUI-Setup-x64.exe
            artifacts/installers/Real-ESRGAN-GUI-Setup-x86.exe
            artifacts/portable-enigma/Real-ESRGAN-GUI-Portable-x64.exe
            artifacts/portable-enigma/Real-ESRGAN-GUI-Portable-x86.exe
            artifacts/release-evidence/SHA256SUMS.txt
            artifacts/release-evidence/release-manifest.json
          if-no-files-found: error

      - name: Write GitHub Release notes
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $notesPath = "artifacts\release-notes\$tag.md"
          ./scripts/write-release-notes.ps1 -Tag $tag -OutputPath $notesPath
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          $assetPaths = @(
            "artifacts\installers\Real-ESRGAN-GUI-Setup-x64.exe",
            "artifacts\installers\Real-ESRGAN-GUI-Setup-x86.exe",
            "artifacts\portable-enigma\Real-ESRGAN-GUI-Portable-x64.exe",
            "artifacts\portable-enigma\Real-ESRGAN-GUI-Portable-x86.exe",
            "artifacts\release-evidence\SHA256SUMS.txt",
            "artifacts\release-evidence\release-manifest.json"
          )
          foreach ($assetPath in $assetPaths) {
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
              throw "Release asset was not found: $assetPath"
            }
          }
          $notesPath = "${{ steps.release_notes.outputs.notes_path }}"
          if (-not (Test-Path -LiteralPath $notesPath -PathType Leaf)) {
            throw "Release notes were not generated: $notesPath"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release edit $tag --notes-file $notesPath
            & gh release upload $tag @assetPaths --clobber
          }
          else {
            & gh release create $tag @assetPaths --verify-tag --title "Real-ESRGAN GUI $tag" --notes-file $notesPath
          }
