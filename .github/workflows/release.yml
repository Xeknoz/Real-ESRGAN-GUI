name: Build Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Build dist
        shell: pwsh
        run: ./scripts/build-dist.ps1 -Clean

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path dist\* -DestinationPath artifacts\Real-ESRGAN-GUI-win-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Real-ESRGAN-GUI-win-x64
          path: artifacts/Real-ESRGAN-GUI-win-x64.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "artifacts\Real-ESRGAN-GUI-win-x64.zip"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --verify-tag --generate-notes
          }
